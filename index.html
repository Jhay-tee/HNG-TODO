<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main>
  <article data-testid="test-todo-card" class="card">

    <!-- Checkbox -->
    <div class="top">
      <input 
        type="checkbox" 
        id="todoCheck"
        data-testid="test-todo-complete-toggle"
      />
      <label for="todoCheck">Mark as complete</label>
    </div>

    <!-- Title -->
    <h2 data-testid="test-todo-title" id="todoTitle">
      Complete HNG Stage 0 Task
    </h2>

    <!-- Description -->
    <p data-testid="test-todo-description">
      Build a testable, accessible and responsive Todo Card UI.
    </p>

    <!-- Meta -->
    <div class="meta">
      <span 
        data-testid="test-todo-priority" 
        class="badge priority"
        aria-label="High priority"
      >
        High
      </span>

      <span 
        data-testid="test-todo-status" 
        class="badge status"
        id="todoStatus"
      >
        Pending
      </span>
    </div>

    <!-- Time -->
    <div class="time">
      <time 
        data-testid="test-todo-due-date" 
        id="dueDate"
      ></time>

      <time 
        data-testid="test-todo-time-remaining"
        id="timeRemaining"
        aria-live="polite"
      ></time>
    </div>

    <!-- Tags -->
    <ul data-testid="test-todo-tags" class="tags" role="list">
      <li data-testid="test-todo-tag-work">Work</li>
      <li data-testid="test-todo-tag-urgent">Urgent</li>
      <li>Design</li>
    </ul>

    <!-- Actions -->
    <div class="actions">
      <button 
        data-testid="test-todo-edit-button"
        aria-label="Edit task"
      >
        Edit
      </button>

      <button 
        data-testid="test-todo-delete-button"
        aria-label="Delete task"
      >
        Delete
      </button>
    </div>

  </article>
</main>

<script src="script.js"></script>
</body>
</html>
